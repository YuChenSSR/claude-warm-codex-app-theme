# Claude Warm for Codex App
# Paste this into ~/.codex/config.toml, replacing any existing
# [desktop.appearanceLightChromeTheme] block and nested tables.
# Optional: under the existing [desktop] table, set:
# appearanceLightCodeThemeId = "notion"

[desktop.appearanceLightChromeTheme]
accent = "#B7791F"
contrast = 40
ink = "#494536"
opaqueWindows = true
surface = "#F8F7F2"

[desktop.appearanceLightChromeTheme.fonts]

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#4B6F3D"
diffRemoved = "#7C1B13"
skill = "#8A5E16"
